name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-14
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Sync package.json version with tag
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          echo "Setting package.json version to $TAG_VERSION (from tag $GITHUB_REF_NAME)"
          npm version --no-git-tag-version --allow-same-version "$TAG_VERSION"

      - name: Typecheck
        run: npm run typecheck

      - name: Build dmg / zip (ad-hoc signed, unnotarized)
        run: npm run dist
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            /tmp/mp4tosrt-release/*.dmg
            /tmp/mp4tosrt-release/*.zip
          generate_release_notes: true
          fail_on_unmatched_files: true
