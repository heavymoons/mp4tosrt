name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-14
    # npm run dist が setup:llama (gilad/gemma4 ブランチ clone + ビルド + llama.cpp
    # b9524 ソースビルド) を内部で実行するため、通常より +5〜15 分かかる。
    timeout-minutes: 90
    # setup:llama の `source download` は llama.cpp リリース解決で GitHub API を叩く。
    # 未認証だと共有ランナーIPの 60req/h 上限(403)に当たるため、Actions が自動提供する
    # GITHUB_TOKEN を全ステップに渡して認証リクエストにする(node-llama-cpp の
    # GitHubClient は GITHUB_TOKEN / GH_TOKEN を参照する)。
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          # setup:llama の gilad/gemma4 ブランチビルドはローカル Node 22 で検証済み
          # (branch の engines は >=20 だが、検証環境と揃える)。
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Sync package.json version with tag
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          echo "Setting package.json version to $TAG_VERSION (from tag $GITHUB_REF_NAME)"
          npm version --no-git-tag-version --allow-same-version "$TAG_VERSION"

      - name: Typecheck
        run: npm run typecheck

      - name: Build dmg / zip (ad-hoc signed, unnotarized)
        run: npm run dist
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            /tmp/mp4tosrt-release/*.dmg
          generate_release_notes: true
          fail_on_unmatched_files: true
